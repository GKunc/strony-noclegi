name: Build static pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run static build script
        run: node build.js

      # Opcjonalnie: upewnij się, że commit ma już wygenerowane pliki
      - name: Verify working tree is clean
        run: git diff --exit-code
